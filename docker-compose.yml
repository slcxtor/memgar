version: '3.8'

services:
  # =============================================================================
  # DATABASE
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: memgar-postgres
    environment:
      POSTGRES_DB: memgar
      POSTGRES_USER: memgar
      POSTGRES_PASSWORD: memgar_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memgar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memgar-network

  # =============================================================================
  # CACHE & MESSAGE BROKER
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: memgar-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memgar-network

  # =============================================================================
  # BACKEND API
  # =============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memgar-backend
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://memgar:memgar_password@postgres:5432/memgar
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    networks:
      - memgar-network
    restart: unless-stopped

  # =============================================================================
  # CELERY WORKER (Background Tasks)
  # =============================================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memgar-celery-worker
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://memgar:memgar_password@postgres:5432/memgar
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/app:/app/app
    networks:
      - memgar-network
    restart: unless-stopped

  # =============================================================================
  # CELERY BEAT (Scheduled Tasks)
  # =============================================================================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memgar-celery-beat
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://memgar:memgar_password@postgres:5432/memgar
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/app:/app/app
    networks:
      - memgar-network
    restart: unless-stopped

  # =============================================================================
  # CELERY FLOWER (Monitoring)
  # =============================================================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memgar-flower
    command: celery -A app.celery_app flower --port=5555
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker
    networks:
      - memgar-network
    restart: unless-stopped

  # =============================================================================
  # FRONTEND DASHBOARD (React)
  # =============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: memgar-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - memgar-network
    restart: unless-stopped

  # =============================================================================
  # LANDING PAGE (Next.js)
  # =============================================================================
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: memgar-landing
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3001:3000"
    volumes:
      - ./landing/src:/app/src
    networks:
      - memgar-network
    restart: unless-stopped

  # =============================================================================
  # NGINX (Reverse Proxy)
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: memgar-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
      - landing
    networks:
      - memgar-network
    restart: unless-stopped

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  memgar-network:
    driver: bridge
